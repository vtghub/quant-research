name: Tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch: {}

jobs:
  offline-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: pip install -e ".[dev,fred,duckdb]"

      - name: Run offline test suite
        run: pytest -v
        # No network-marked tests run here (pytest.ini defaults to -m "not
        # network"); see live-tests.yml for the live-vendor suite.
