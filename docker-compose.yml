services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${QRA_POSTGRES_USER:-qra}
      POSTGRES_PASSWORD: ${QRA_POSTGRES_PASSWORD:-qra}
      POSTGRES_DB: ${QRA_POSTGRES_DB:-qra}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${QRA_POSTGRES_USER:-qra}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    environment:
      QRA_DATABASE_URL: postgresql+psycopg://${QRA_POSTGRES_USER:-qra}:${QRA_POSTGRES_PASSWORD:-qra}@postgres:5432/${QRA_POSTGRES_DB:-qra}
      QRA_REDIS_URL: redis://redis:6379/0
      QRA_CORS_ORIGINS: '["http://localhost:5173","http://localhost:8080"]'
      QRA_JWT_SECRET: ${QRA_JWT_SECRET:-dev-secret-change-me-to-something-random-and-at-least-32-bytes-long}
      FRED_API_KEY: ${FRED_API_KEY:-}
      ALPHAVANTAGE_API_KEY: ${ALPHAVANTAGE_API_KEY:-}
      NASDAQ_DATA_LINK_API_KEY: ${NASDAQ_DATA_LINK_API_KEY:-}
      SEC_EDGAR_USER_AGENT: ${SEC_EDGAR_USER_AGENT:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - api_data:/app/api/api_data
      - api_cache:/app/api/.cache

  worker:
    build:
      context: .
      dockerfile: api/Dockerfile
    command: celery -A quant_research_api.celery_app worker --loglevel=info
    environment:
      QRA_DATABASE_URL: postgresql+psycopg://${QRA_POSTGRES_USER:-qra}:${QRA_POSTGRES_PASSWORD:-qra}@postgres:5432/${QRA_POSTGRES_DB:-qra}
      QRA_REDIS_URL: redis://redis:6379/0
      QRA_JWT_SECRET: ${QRA_JWT_SECRET:-dev-secret-change-me-to-something-random-and-at-least-32-bytes-long}
      FRED_API_KEY: ${FRED_API_KEY:-}
      ALPHAVANTAGE_API_KEY: ${ALPHAVANTAGE_API_KEY:-}
      NASDAQ_DATA_LINK_API_KEY: ${NASDAQ_DATA_LINK_API_KEY:-}
      SEC_EDGAR_USER_AGENT: ${SEC_EDGAR_USER_AGENT:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - api_data:/app/api/api_data
      - api_cache:/app/api/.cache

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "8080:80"
    depends_on:
      - api

volumes:
  postgres_data:
  api_data:
  api_cache:
